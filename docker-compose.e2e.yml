version: '3.8'

services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://testuser:testpass@db:5432/liquifact_test
      - JWT_SECRET=supersecret-test-token-key-32-chars-long
      - SOROBAN_RPC_URL=http://mock-soroban:8000
    depends_on:
      db:
        condition: service_healthy
      mock-soroban:
        condition: service_started
    networks:
      - e2e-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=liquifact_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d liquifact_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-net

  mock-soroban:
    build:
      context: ./tests/mocks
      dockerfile: Dockerfile.mock
    ports:
      - "8000:8000"
    networks:
      - e2e-net

networks:
  e2e-net:
    driver: bridge
