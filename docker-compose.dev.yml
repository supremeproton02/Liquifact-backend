version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: liquifact-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: liquifact
      POSTGRES_USER: liquifact_user
      POSTGRES_PASSWORD: liquifact_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquifact_user -d liquifact"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - liquifact-network

  redis:
    image: redis:7-alpine
    container_name: liquifact-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - liquifact-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  liquifact-network:
    driver: bridge
